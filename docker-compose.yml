services:
  tabby:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - tabby-data:/app/data
    environment:
      - DATABASE_PATH=/app/data/tabby.db
      - OLLAMA_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    develop:
      watch:
        - action: rebuild
          path: ./app
        - action: rebuild
          path: ./components
        - action: rebuild
          path: ./lib
        - action: rebuild
          path: ./types
        - action: rebuild
          path: package.json
        - action: rebuild
          path: bun.lock
        - action: rebuild
          path: next.config.mjs

volumes:
  tabby-data:
